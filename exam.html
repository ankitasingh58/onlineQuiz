  <script>        
  //define your time in second
  $(document).ready(function(){
    $("#start").click(function(){

    var c=1199;
        var t;
        timedCount();
        function timedCount()
        {
          var minutes = parseInt( c / 60 ) % 60;
          var seconds = c % 60;
          var result = (minutes < 60 ?  minutes : minutes) + ":" + (seconds  < 10 ? seconds : seconds);
          $('#time').html(result);
            if(c == 0 )
             {
            $('#quiz').remove();
            $('#next').remove();
            $('#time').remove();
            $('#dev').show();
            $('#res').show();
            $('#score').text("You have completed the quiz,your score is " + score);//score*(100/i)
            $('#results').fadeIn('fast');
             }
            c = c - 1;
            t = setTimeout(function()
               {
                timedCount()},1000);
              }   
    })
  })
